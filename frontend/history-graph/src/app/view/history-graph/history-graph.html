<div #container class="history-graph-container">
	<div class="top-controls">
		<prompt-view (submit)="onPromptEntered($event)" [isLoading]="isLoading()" />
		<preference-view />
	</div>
	<tl-header [timeline]="timelines()[0].timeline" [dateFormat]="dateFormat()" />
	<div #historyGraphArea class="history-graph-area">
		<timeline-legend
			[timelines]="timelines()"
			[combinedTimeline]="combinedTimeline()"
			[dateFormat]="dateFormat()"
		/>
		<svg [attr.width]="viewSize().width" [attr.height]="viewSize().height" xmlns="http://www.w3.org/2000/svg">
			@if (isOverviewVisible()) {
				<g tl-overview />
			}
			@for (timeline of timelines(); track timeline; let i = $index) {
				<g tl-timeline
					[timeline]="timeline"
					[timelineIdx]="i"
					[textStyle]="textStyle()"
					[lineStyle]="lineStyle()"
				/>
			}
			<g event-labels
				[textStyle]="textStyle()"
				[lineStyle]="lineStyle()"
			/>
			<g event-mapping />
		</svg>
	</div>
	
	<!-- Global overlay component for timeline events -->
	<event-overlay [dateFormat]="dateFormat()" />
</div>
