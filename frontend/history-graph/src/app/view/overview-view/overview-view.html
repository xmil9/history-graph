<svg:g xmlns:svg="http://www.w3.org/2000/svg">
	<rect
		[attr.x]="overviewBounds.left"
		[attr.y]="overviewBounds.top"
		[attr.width]="overviewBounds.width"
		[attr.height]="overviewBounds.height"
		[attr.fill]="background()"
		[attr.stroke]="lineStyle().color"
		stroke-width="0.2"
		rx="4"
		ry="4"
	/>
	<rect
		[attr.x]="viewedBounds.left"
		[attr.y]="viewedBounds.top"
		[attr.width]="viewedBounds.width"
		[attr.height]="viewedBounds.height"
		[attr.fill]="displayedBackground()"
		[attr.stroke]="displayedLineStyle().color"
		[attr.stroke-width]="displayedLineStyle().width"
		opacity="1.0"
		rx="2"
		ry="2"
	/>
	<line
		id="axis"
		[attr.x1]="axisBounds.left"
		[attr.y1]="axisBounds.center.y"
		[attr.x2]="axisBounds.right"
		[attr.y2]="axisBounds.center.y"
		[attr.stroke]="lineStyle().color"
		[attr.stroke-width]="lineStyle().width"
	/>
	<g 
		svg-icon 
		class="overview-start-position"
		[name]="'tl-start'" 
		[origin]="SvgIconOrigin.Center" 
		[position]="startPosition" 
		[size]="markerSize"
		[opacity]="startIconOpacity"
	></g>
	<g 
		svg-icon 
		class="overview-end-position"
		[name]="'tl-end'" 
		[origin]="SvgIconOrigin.Center" 
		[position]="endPosition" 
		[size]="markerSize"
		[opacity]="endIconOpacity"
	></g>
	@for (eventPos of combinedEventPositions; track $index) {
		@let markerColor = getMarkerColor($index);

		@if (eventPos.event.hEvent.isPeriod) {
			@let periodBounds = getOverviewPeriodBounds($index);
			@let periodColor = getPeriodColor($index);
			<rect
				[attr.x]="periodBounds.left"
				[attr.y]="periodBounds.top"
				[attr.width]="periodBounds.width"
				[attr.height]="periodBounds.height"
				[attr.fill]="periodColor"
				[attr.stroke]="periodColor"
				[attr.stroke-width]="1"
				opacity="0.3"
				rx="2"
				ry="2"
			/>
			<g 
				svg-icon 
				[name]="'tl-period-from'" 
				[origin]="SvgIconOrigin.CenterLeft" 
				[position]="eventPos.start" 
				[size]="eventMarkerSize"
				[opacity]="eventIconOpacity"
				[color]="markerColor"
			></g>
			<g 
				svg-icon 
				[name]="'tl-period-to'" 
				[origin]="SvgIconOrigin.CenterRight" 
				[position]="eventPos.end!" 
				[size]="eventMarkerSize"
				[opacity]="eventIconOpacity"
				[color]="markerColor"
			></g>
		} @else {
			<g 
				svg-icon 
				class="overview-event-position"
				[name]="'tl-date'" 
				[origin]="SvgIconOrigin.Center" 
				[position]="eventPos.start" 
				[size]="eventMarkerSize"
				[opacity]="eventIconOpacity"
				[color]="markerColor"
			></g>
		}
	}
</svg:g>
