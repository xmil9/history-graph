<div class="timeline-legend">
	@for (item of legendItems(); track item.id) {
		<div class="legend-item" [style.border-left-color]="item.color">
			<div class="legend-header">
				<span class="legend-title">{{ item.title }}</span>
				<div class="legend-actions" style="display: flex; gap: 4px;">
					<button
						class="toggle-btn"
						[class.hidden]="!item.isVisible()"
						[title]="item.isVisible() ? 'Hide timeline' : 'Show timeline'"
						(click)="toggle(item.id)"
					>
						@if (item.isVisible()) {
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
								<circle cx="12" cy="12" r="3"/>
							</svg>
						} @else {
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
								<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
								<path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
								<line x1="1" y1="1" x2="23" y2="23"/>
							</svg>
						}
					</button>
					@if (item.canRemove) {
						<button
							class="remove-btn"
							title="Remove timeline"
							(click)="remove(item.id)"
						>
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
								<polyline points="3 6 5 6 21 6"></polyline>
								<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
								<line x1="10" y1="11" x2="10" y2="17"></line>
								<line x1="14" y1="11" x2="14" y2="17"></line>
							</svg>
						</button>
					}
				</div>
			</div>
			<div class="legend-meta">
				<span class="legend-period">{{ item.from }} – {{ item.to }}</span>
				<span class="legend-count">{{ item.eventCount }} event{{ item.eventCount !== 1 ? 's' : '' }}</span>
			</div>
		</div>
	}
</div>
