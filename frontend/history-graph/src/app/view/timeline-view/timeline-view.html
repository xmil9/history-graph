<svg:g xmlns:svg="http://www.w3.org/2000/svg">
	<g tl-axis
		[timelineIdx]="timelineIdx()"
		[startLabel]="startLabel()"
		[endLabel]="endLabel()"
		[textStyle]="textStyle()"
		[lineStyle]="lineStyle()"
	/>
	@if (timeline().events && timeline().events.length > 0) {
		@for (tlEvent of timeline().events; track tlEvent.when; let i = $index) {
			<g tl-event
				[tlEvent]="tlEvent"
				[index]="i"
				[textStyle]="textStyle()"
				[lineStyle]="lineStyle()"
			/>
		}
	}
</svg:g>
