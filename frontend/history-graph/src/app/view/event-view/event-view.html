<svg:g xmlns:svg="http://www.w3.org/2000/svg">
	@if (isPeriod()) {
		<rect
			class="event-period"
			[attr.x]="periodBounds.left"
			[attr.y]="periodBounds.top"
			[attr.width]="periodBounds.width"
			[attr.height]="periodBounds.height"
			[attr.fill]="periodColor"
			[attr.stroke]="periodColor"
			[attr.stroke-width]="1"
			opacity="0.3"
			rx="2"
			ry="2"
		/>
		<g svg-icon
			class="event-marker"
			[name]="'tl-period-from'"
			[origin]="SvgIconOrigin.CenterLeft"
			[position]="position"
			[size]="eventMarkerSize"
			[color]="markerColor"
			(mouseenter)="onMarkerMouseEnter($event)"
			(mousemove)="onMarkerMouseMove($event)"
			(mouseleave)="onMarkerMouseLeave()">
		</g>
		<g svg-icon
			class="event-marker"
			[name]="'tl-period-to'"
			[origin]="SvgIconOrigin.CenterRight"
			[position]="endPosition"
			[size]="eventMarkerSize"
			[color]="markerColor"
			(mouseenter)="onMarkerMouseEnter($event)"
			(mousemove)="onMarkerMouseMove($event)"
			(mouseleave)="onMarkerMouseLeave()">
		</g>
	} @else {
		<g svg-icon
			class="event-marker"
			[name]="'tl-date'"
			[origin]="SvgIconOrigin.Center"
			[position]="position"
			[size]="eventMarkerSize"
			[color]="markerColor"
			(mouseenter)="onMarkerMouseEnter($event)"
			(mousemove)="onMarkerMouseMove($event)"
			(mouseleave)="onMarkerMouseLeave()">
		</g>
	}	
</svg:g>
